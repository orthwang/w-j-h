  - DOMAIN-SUFFIX,bbcx.co.uk
  - DOMAIN-SUFFIX,bbcstudios.com
  - DOMAIN-SUFFIX,bbcrewind.co.uk
  
  # > 2. iPlayer 专用视频分发 CDN (极其关键)
  - DOMAIN-SUFFIX,aod-dash-uk-live.akamaized.net
  - DOMAIN-SUFFIX,aod-hls-uk-live.akamaized.net
  - DOMAIN-SUFFIX,vod-dash-uk-live.akamaized.net
  - DOMAIN-SUFFIX,vod-hls-uk-live.akamaized.net
  - DOMAIN-SUFFIX,vod-sub-uk-live.akamaized.net
  - DOMAIN-SUFFIX,vod-thumb-uk-live.akamaized.net
  - DOMAIN-SUFFIX,as-dash-uk-live.akamaized.net
  - DOMAIN-SUFFIX,as-hls-uk-live.akamaized.net
  - DOMAIN-SUFFIX,vs-hls-uk-live.akamaized.net
  - DOMAIN-SUFFIX,vs-cmaf-uk-live.akamaized.net
  - DOMAIN-SUFFIX,bbccom-a.akamaihd.net
  - DOMAIN-SUFFIX,bbcfmt.hs.llnwd.net
  - DOMAIN-SUFFIX,bbcfmt.s.llnwd.net
  - DOMAIN-SUFFIX,b-cdn.co.uk
  
  # > 3. 泛匹配关键字 (兜底各种动态生成的流媒体子域名)
  - DOMAIN-KEYWORD,bbcfmt
  - DOMAIN-KEYWORD,uk-live
  
  # > 4. 其他相关与追踪 (避免 App 检测到网络异常而封锁)
  - DOMAIN-SUFFIX,bbcverticals.com
  - DOMAIN-SUFFIX,bbcpersian.com
  
  # > 5. IP 兜底 (拦截电视端 App 绕过 DNS 直接发送的底层 IP 请求)
  - IP-CIDR,212.58.224.0/19,no-resolve
  - IP-CIDR,132.185.0.0/16,no-resolve
  - IP-CIDR,185.112.156.0/22,no-resolve
  - IP-CIDR,89.234.10.252/30,no-resolve

  # =========================================
  #              ITV / ITVX 规则
  # =========================================
  # > 1. ITV / ITVX 主域名
  - DOMAIN-SUFFIX,itv.com
  - DOMAIN-SUFFIX,itvx.com
  - DOMAIN-SUFFIX,itvstatic.com
  - DOMAIN-SUFFIX,itv.co.uk
  - DOMAIN-SUFFIX,itvx.co.uk
  - DOMAIN-SUFFIX,itvhub.com
  
  # > 2. 视频流、CDN、DRM 鉴权及播放器授权 (播放核心)
  - DOMAIN,itvpnp.live.ott.irdeto.com
  - DOMAIN,itvpnpmobile-a.akamaihd.net
  - DOMAIN,sks.itvpnp.live.ott.irdeto.com
  - DOMAIN,simus.itvpnp.live.ott.irdeto.com
  - DOMAIN,sdp.itv.com
  - DOMAIN,tomahawk.itv.com
  - DOMAIN,playlist.itv.com
  - DOMAIN,itv.com.edgekey.net
  - DOMAIN-SUFFIX,itv.net
  - DOMAIN-SUFFIX,theoplayer.com
  
  # > 3. 界面静态资源 (剧集海报、视频缩略图、UI 图标)
  - DOMAIN-SUFFIX,ctfassets.net
  
  # > 4. 遥测、日志、分析与监控 (防止 App 卡顿及防范 IP 泄漏)
  - DOMAIN-SUFFIX,itv.demdex.net
  - DOMAIN-SUFFIX,itv.112.2o7.net
  - DOMAIN-SUFFIX,amplitude.com
  - DOMAIN-SUFFIX,launchdarkly.com
  - DOMAIN-SUFFIX,braze.eu
  - DOMAIN-SUFFIX,conviva.com
  - DOMAIN-KEYWORD,splunkcloud
  - DOMAIN,server-side-tagging-120973504724.europe-west2.run.app
  - DOMAIN-SUFFIX,2cnt.net
  
  # > 5. 广告服务 (防止去广告规则误杀导致 ITVX 正片黑屏报错)
  - DOMAIN-SUFFIX,fwmrm.net
  
  # > 6. ITV 关键词匹配 (全局兜底)
  - DOMAIN-KEYWORD,itvx

  # =========================================
  #              Channel 4 规则
  # =========================================
  # > 1. Channel 4 主域名及API
  - DOMAIN-SUFFIX,channel4.com
  
  # > 2. 视频分发 (CDN) 与图片资源 (极其关键，防止加载卡死或无海报)
  - DOMAIN-SUFFIX,c4assets.com
  - DOMAIN-SUFFIX,c4assets.com.edgesuite.net
  - DOMAIN-SUFFIX,bips.channel4.com
  - DOMAIN-SUFFIX,ais.channel4.com
  
  # > 3. 用户身份与单点登录服务 (SSO)
  - DOMAIN-SUFFIX,identity.channel4.com
  - DOMAIN-SUFFIX,p.gigya.com # Gigya 提供很多英美流媒体的用户系统后台
  
  # > 4. DRM 鉴权与播放器 telemetry (防止视频转圈报错)
  - DOMAIN-SUFFIX,optimizely.com # A/B测试与播放器配置
  - DOMAIN-SUFFIX,yospace.com # 视频内广告插入技术 (不走代理可能会导致正片也无法播放)
  
  # > 5. Channel 4 关键词匹配 (全局兜底)
  - DOMAIN-KEYWORD,channel4

  # =========================================
  #                 My5 规则
  # =========================================
  # > 1. My5 及 Channel 5 主域名
  - DOMAIN-SUFFIX,channel5.com
  - DOMAIN-SUFFIX,my5.tv
  
  # > 2. 核心视频 API 与分发网络
  - DOMAIN-SUFFIX,5demand.com
  - DOMAIN-SUFFIX,mtvnservices.com # My5 隶属于派拉蒙，使用了很多其母公司的视频基建
  - DOMAIN-SUFFIX,mtvservices.com
  - DOMAIN-SUFFIX,play.five.tv
  
  # > 3. 界面图库与静态资源
  - DOMAIN-SUFFIX,images.my5.tv
  
  # > 4. DRM、用户追踪与广告防杀
  - DOMAIN-SUFFIX,imrworldwide.com
  - DOMAIN-SUFFIX,scorecardresearch.com
  
  # > 5. My5 关键词匹配 (全局兜底)
  - DOMAIN-KEYWORD,my5
